<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Hermanos Paca</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  /* =============================
     VARIABLES - MODO CLARO
     ============================= */
  :root {
    --fondo: linear-gradient(135deg, #f4e9dc, #e8d0b0);
    --card: #ffffff;
    --texto: #3b2200;
    --texto-sec: #6b4a24;
    --input-bg: #ffffff;
    --borde: #c8a06a;
    --boton: linear-gradient(135deg, #c68642, #e0a15a);
    --boton-texto: #2b1600;
  }

  /* =============================
     MODO OSCURO MANUAL
     ============================= */
  body.dark-mode {
    --fondo: linear-gradient(135deg, #0f0f0f, #3b2200);
    --card: #2b1600;
    --texto: #f5e9da;
    --texto-sec: #d6c1a3;
    --input-bg: #3a1f00;
    --borde: #6b3e16;
    --boton: linear-gradient(135deg, #c68642, #e0a15a);
    --boton-texto: #2b1600;
  }

  body {
    min-height: 100vh;
    background: var(--fondo);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    transition: background 0.4s ease;
  }

  .login-card {
    background: var(--card);
    border-radius: 18px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.45);
    padding: 40px 35px;
    width: 100%;
    max-width: 420px;
    color: var(--texto);
    position: relative;
  }

  .logo {
    text-align: center;
    margin-bottom: 18px;
  }

  .logo img {
    width: 110px;
  }

  h3 {
    text-align: center;
    color: #e0a15a;
    font-weight: bold;
  }

  p {
    text-align: center;
    font-size: 14px;
    margin-bottom: 25px;
    color: var(--texto-sec);
  }

  .form-control {
    background: var(--input-bg);
    border: 1px solid var(--borde);
    border-radius: 10px;
    padding: 12px;
    color: var(--texto);
  }

  .form-control::placeholder {
    color: var(--texto-sec);
  }

  .form-control:focus {
    border-color: #e0a15a;
    box-shadow: none;
  }

  .btn-login {
    background: var(--boton);
    color: var(--boton-texto);
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn-login:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .footer-text {
    text-align: center;
    font-size: 13px;
    margin-top: 25px;
    color: var(--texto-sec);
  }

  /* ===== BOTÓN TOGGLE ===== */
  .theme-toggle {
    position: absolute;
    top: 15px;
    right: 15px;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #e0a15a;
  }
</style>
</head>

<body>

<div class="login-card">

  <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
    🌙
  </button>

  <div class="logo">
    <img src="img/logo.png" alt="Hermanos Paca">
  </div>

  <h3>Acceso al Sistema</h3>
  <p>Panadería y Embutidos Hermanos Paca</p>

  <form action="/login" method="POST">
    <input type="email" class="form-control mb-3"
           name="email" placeholder="Correo electrónico" required>

    <input type="password" class="form-control mb-3"
           name="password" placeholder="Contraseña" required>

    <button type="submit" class="btn btn-login w-100">
      Iniciar sesión
    </button>
  </form>

  <div class="footer-text">
    © 2026 · Hermanos Paca
  </div>
</div>

<script>
  const toggleBtn = document.getElementById('themeToggle');
  const body = document.body;

  // Cargar preferencia guardada
  const savedTheme = localStorage.getItem('theme');

  if (savedTheme === 'dark') {
    body.classList.add('dark-mode');
    toggleBtn.textContent = '☀️';
  }

  toggleBtn.addEventListener('click', () => {
    body.classList.toggle('dark-mode');

    if (body.classList.contains('dark-mode')) {
      localStorage.setItem('theme', 'dark');
      toggleBtn.textContent = '☀️';
    } else {
      localStorage.setItem('theme', 'light');
      toggleBtn.textContent = '🌙';
    }
  });
</script>

</body>
</html>
